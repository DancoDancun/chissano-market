<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Chissano AnimalMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #059669, #10B981); padding: 20px; }
        .login-box { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-header { text-align: center; margin-bottom: 25px; }
        .login-header h1 { font-size: 22px; color: #1F2937; }
        .login-header p { color: #6B7280; font-size: 13px; margin-top: 5px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 12px; color: #374151; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; }
        .form-group input:focus { border-color: #059669; }
        .error-msg { background: #FEE2E2; color: #991B1B; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; }
        .error-msg.show { display: block; }
        .success-msg { background: #D1FAE5; color: #065F46; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; }
        .success-msg.show { display: block; }
        .btn-login { width: 100%; padding: 14px; background: #059669; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-login:hover { background: #047857; }
        .btn-login:disabled { opacity: 0.7; }
        .login-footer { text-align: center; margin-top: 20px; }
        .login-footer a { color: #059669; text-decoration: none; font-size: 13px; font-weight: 500; }
        .step { display: none; } .step.active { display: block; }
        .code-note { background: #F0FDF4; border: 1px solid #D1FAE5; padding: 12px; text-align: center; border-radius: 10px; margin: 15px 0; font-size: 12px; color: #065F46; }
        .code-note.dev { background: #FEF3C7; color: #92400E; border-color: #FCD34D; }
        .resend-link { color: #059669; cursor: pointer; font-size: 12px; text-decoration: underline; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>Chissano Admin Access</h1>
            <p>Two-factor authentication</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="step active" id="step1">
            <form onsubmit="handleStep1(event)">
                <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Enter username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password" required></div>
                <button type="submit" class="btn-login" id="btnStep1"><span class="btn-text">Continue</span><div class="spinner"></div></button>
            </form>
        </div>

        <div class="step" id="step2">
            <p style="text-align:center;font-size:14px;margin-bottom:5px;">A verification code has been sent.</p>
            <div class="code-note" id="codeNote">Sending code...</div>
            <form onsubmit="handleStep2(event)">
                <div class="form-group"><label>Enter 6-Digit Code</label><input type="text" id="verifyCode" placeholder="000000" maxlength="6" required pattern="[0-9]{6}" inputmode="numeric"></div>
                <button type="submit" class="btn-login" id="btnStep2"><span class="btn-text">Verify & Login</span><div class="spinner"></div></button>
            </form>
            <p style="text-align:center;margin-top:12px;"><span class="resend-link" onclick="sendVerificationCode()">Resend Code</span></p>
            <p style="text-align:center;margin-top:5px;"><a href="#" onclick="goBack()" style="color:#6B7280;font-size:12px;">Back to login</a></p>
        </div>
    </div>
    <div class="login-footer"><a href="index.html">&larr; Back to Marketplace</a></div>

    <script>
        var currentCode = '';
        var codeExpiry = 0;
        var adminEmail = '';

        function getEmailSettings() {
            var saved = localStorage.getItem('emailjsSettings');
            return saved ? JSON.parse(saved) : null;
        }

        function getCredentials() {
            var saved = localStorage.getItem('adminCredentials');
            return saved ? JSON.parse(saved) : { username: 'admin', password: 'admin123' };
        }

        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function handleStep1(e) {
            e.preventDefault();
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value;
            var creds = getCredentials();
            var error = document.getElementById('errorMsg');
            var btn = document.getElementById('btnStep1');
            btn.classList.add('loading');
            
            setTimeout(function() {
                if (user === creds.username && pass === creds.password) {
                    error.classList.remove('show');
                    var emailSettings = getEmailSettings();
                    adminEmail = (emailSettings && emailSettings.adminEmail) ? emailSettings.adminEmail : 'admin@chissano.co.ke';
                    showStep2();
                    sendVerificationCode();
                } else {
                    error.textContent = 'Invalid username or password.';
                    error.classList.add('show');
                    document.getElementById('password').value = '';
                }
                btn.classList.remove('loading');
            }, 600);
        }

        function showStep2() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('errorMsg').classList.remove('show');
        }

        function sendVerificationCode() {
            currentCode = generateCode();
            codeExpiry = Date.now() + 300000;
            var settings = getEmailSettings();
            var note = document.getElementById('codeNote');
            
            if (settings && settings.publicKey && settings.serviceId && settings.templateId && settings.adminEmail) {
                adminEmail = settings.adminEmail;
                emailjs.init(settings.publicKey);
                note.textContent = 'Sending code to ' + adminEmail + '...';
                note.className = 'code-note';
                
                emailjs.send(settings.serviceId, settings.templateId, {
                    to_email: adminEmail,
                    to_name: 'Admin',
                    code: currentCode,
                    expiry: '5 minutes'
                }).then(function() {
                    note.innerHTML = 'Code sent to <strong>' + adminEmail + '</strong>. Check your inbox.';
                }).catch(function(err) {
                    console.log('EmailJS error:', err);
                    showFallbackCode();
                });
            } else {
                showFallbackCode();
            }
        }

        function showFallbackCode() {
            var note = document.getElementById('codeNote');
            note.innerHTML = '<strong>DEV MODE</strong><br>Your code: <span style="font-size:24px;font-weight:700;color:#059669;">' + currentCode + '</span>';
            note.className = 'code-note dev';
        }

        function handleStep2(e) {
            e.preventDefault();
            var entered = document.getElementById('verifyCode').value.trim();
            var error = document.getElementById('errorMsg');
            var success = document.getElementById('successMsg');
            var btn = document.getElementById('btnStep2');
            btn.classList.add('loading');
            
            setTimeout(function() {
                if (Date.now() > codeExpiry) {
                    error.textContent = 'Code expired. Please resend.';
                    error.classList.add('show');
                    btn.classList.remove('loading');
                    return;
                }
                if (entered === currentCode) {
                    error.classList.remove('show');
                    success.textContent = 'Login successful! Redirecting...';
                    success.classList.add('show');
                    
                    var token = btoa('admin:' + Date.now());
                    localStorage.setItem('adminToken', token);
                    localStorage.setItem('adminTokenExpiry', (Date.now() + 86400000).toString());
                    localStorage.setItem('adminUser', 'admin');
                    
                    setTimeout(function() { window.location.href = 'admin.html'; }, 800);
                } else {
                    error.textContent = 'Invalid code. Please try again.';
                    error.classList.add('show');
                    document.getElementById('verifyCode').value = '';
                    btn.classList.remove('loading');
                }
            }, 500);
        }

        function goBack() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        if (localStorage.getItem('adminToken') && Date.now() < parseInt(localStorage.getItem('adminTokenExpiry')||0)) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
